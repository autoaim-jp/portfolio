<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" style="background: transparent; background-color: transparent; color-scheme: light dark;" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" width="1613px" height="398px" viewBox="-0.5 -0.5 1613 398"><defs/><g><g data-cell-id="0"><g data-cell-id="1"><g data-cell-id="2"><g><rect x="0" y="1" width="200" height="200" fill="#ffffff" stroke="#000000" stroke-dasharray="3 3" pointer-events="all" style="fill: light-dark(rgb(255, 255, 255), rgb(18, 18, 18)); stroke: light-dark(rgb(0, 0, 0), rgb(237, 237, 237));"/></g><g><g fill="#000000" font-family="Helvetica" font-size="10px" style="fill: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));"><text x="7" y="22">OPQ分析</text><text x="7" y="34">O: AIを使ってスピーディーに</text><text x="7" y="46">　成果物を作り、チームで</text><text x="7" y="58">　同じ品質を再現したい</text><text x="7" y="70">P: 指示・経緯・差分・成果物が</text><text x="7" y="82">　個人に閉じ、レビューと</text><text x="7" y="94">　再現が難しい</text><text x="7" y="106">Q: AI成果物作成を</text><text x="7" y="118">　個人技ではなくチームの</text><text x="7" y="130">　仕組みにするには？</text></g></g></g><g data-cell-id="3"><g><rect x="638" y="1" width="484" height="78" fill="#ffffff" stroke="#000000" stroke-width="2" pointer-events="all" style="fill: light-dark(rgb(255, 255, 255), rgb(18, 18, 18)); stroke: light-dark(rgb(0, 0, 0), rgb(237, 237, 237));"/></g><g><g fill="#000000" font-family="Helvetica" font-weight="bold" text-anchor="middle" font-size="13px" style="fill: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));"><text x="880" y="29.5">提案基盤を導入すれば、</text><text x="880" y="45.5">AI成果物作成のスピードと</text><text x="880" y="61.5">再現性が向上します</text></g></g></g><g data-cell-id="4"><g><rect x="240" y="136" width="280" height="90" fill="#ffffff" stroke="#000000" stroke-width="1.5" pointer-events="all" style="fill: light-dark(rgb(255, 255, 255), rgb(18, 18, 18)); stroke: light-dark(rgb(0, 0, 0), rgb(237, 237, 237));"/></g><g><g fill="#000000" font-family="Helvetica" font-weight="bold" text-anchor="middle" font-size="11px" style="fill: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));"><text x="380" y="179">(1) AIへの入力を</text><text x="380" y="192">再利用できる</text></g></g></g><g data-cell-id="5"><g><rect x="740" y="136" width="280" height="90" fill="#ffffff" stroke="#000000" stroke-width="1.5" pointer-events="all" style="fill: light-dark(rgb(255, 255, 255), rgb(18, 18, 18)); stroke: light-dark(rgb(0, 0, 0), rgb(237, 237, 237));"/></g><g><g fill="#000000" font-family="Helvetica" font-weight="bold" text-anchor="middle" font-size="11px" style="fill: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));"><text x="880" y="179">(2) レビュー工数を</text><text x="880" y="192">削減できる</text></g></g></g><g data-cell-id="6"><g><rect x="1240" y="136" width="280" height="90" fill="#ffffff" stroke="#000000" stroke-width="1.5" pointer-events="all" style="fill: light-dark(rgb(255, 255, 255), rgb(18, 18, 18)); stroke: light-dark(rgb(0, 0, 0), rgb(237, 237, 237));"/></g><g><g fill="#000000" font-family="Helvetica" font-weight="bold" text-anchor="middle" font-size="11px" style="fill: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));"><text x="1380" y="179">(3) 成果物作成を</text><text x="1380" y="192">チームで再現できる</text></g></g></g><g data-cell-id="7"><g><rect x="150" y="296" width="220" height="100" fill="#ffffff" stroke="#000000" stroke-width="1.2" pointer-events="all" style="fill: light-dark(rgb(255, 255, 255), rgb(18, 18, 18)); stroke: light-dark(rgb(0, 0, 0), rgb(237, 237, 237));"/></g><g><g fill="#000000" font-family="Helvetica" text-anchor="middle" font-size="9px" style="fill: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));"><text x="260" y="333">(1-1)</text><text x="260" y="344">背景・目的・制約を</text><text x="260" y="355">毎回手入力し</text><text x="260" y="366">出力品質がばらつく</text></g></g></g><g data-cell-id="8"><g><rect x="390" y="296" width="220" height="100" fill="#ffffff" stroke="#000000" stroke-width="1.2" pointer-events="all" style="fill: light-dark(rgb(255, 255, 255), rgb(18, 18, 18)); stroke: light-dark(rgb(0, 0, 0), rgb(237, 237, 237));"/></g><g><g fill="#000000" font-family="Helvetica" text-anchor="middle" font-size="9px" style="fill: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));"><text x="500" y="333">(1-2)</text><text x="500" y="344">過去の指示・背景・制約を</text><text x="500" y="355">AIが読み、同じ文脈で</text><text x="500" y="366">成果物を作れる</text></g></g></g><g data-cell-id="9"><g><rect x="650" y="296" width="220" height="100" fill="#ffffff" stroke="#000000" stroke-width="1.2" pointer-events="all" style="fill: light-dark(rgb(255, 255, 255), rgb(18, 18, 18)); stroke: light-dark(rgb(0, 0, 0), rgb(237, 237, 237));"/></g><g><g fill="#000000" font-family="Helvetica" text-anchor="middle" font-size="9px" style="fill: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));"><text x="760" y="333">(2-1)</text><text x="760" y="344">前回との差分や変更理由が</text><text x="760" y="355">分からず、管理職の</text><text x="760" y="366">確認負荷が増える</text></g></g></g><g data-cell-id="10"><g><rect x="890" y="296" width="220" height="100" fill="#ffffff" stroke="#000000" stroke-width="1.2" pointer-events="all" style="fill: light-dark(rgb(255, 255, 255), rgb(18, 18, 18)); stroke: light-dark(rgb(0, 0, 0), rgb(237, 237, 237));"/></g><g><g fill="#000000" font-family="Helvetica" text-anchor="middle" font-size="9px" style="fill: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));"><text x="1000" y="333">(2-2)</text><text x="1000" y="344">差分・変更理由・成果物が</text><text x="1000" y="355">残り、レビューすべき点が</text><text x="1000" y="366">明確になる</text></g></g></g><g data-cell-id="11"><g><rect x="1150" y="296" width="220" height="100" fill="#ffffff" stroke="#000000" stroke-width="1.2" pointer-events="all" style="fill: light-dark(rgb(255, 255, 255), rgb(18, 18, 18)); stroke: light-dark(rgb(0, 0, 0), rgb(237, 237, 237));"/></g><g><g fill="#000000" font-family="Helvetica" text-anchor="middle" font-size="9px" style="fill: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));"><text x="1260" y="333">(3-1)</text><text x="1260" y="344">良い成果物ができても</text><text x="1260" y="355">作り方が個人に閉じて</text><text x="1260" y="366">再利用できない</text></g></g></g><g data-cell-id="12"><g><rect x="1390" y="296" width="220" height="100" fill="#ffffff" stroke="#000000" stroke-width="1.2" pointer-events="all" style="fill: light-dark(rgb(255, 255, 255), rgb(18, 18, 18)); stroke: light-dark(rgb(0, 0, 0), rgb(237, 237, 237));"/></g><g><g fill="#000000" font-family="Helvetica" text-anchor="middle" font-size="9px" style="fill: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));"><text x="1500" y="333">(3-2)</text><text x="1500" y="344">指示・経緯・成果物が</text><text x="1500" y="355">組織に残り、次の人も</text><text x="1500" y="366">同じ手順を使える</text></g></g></g><g data-cell-id="13"><g><path d="M 200 101 L 419 101 L 419 40 L 631.63 40" fill="none" stroke="#000000" stroke-miterlimit="10" stroke-dasharray="3 3" pointer-events="stroke" style="stroke: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));"/><path d="M 636.88 40 L 629.88 43.5 L 631.63 40 L 629.88 36.5 Z" fill="#000000" stroke="#000000" stroke-miterlimit="10" pointer-events="all" style="fill: light-dark(rgb(0, 0, 0), rgb(255, 255, 255)); stroke: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));"/></g></g><g data-cell-id="14"><g><path d="M 880 79 L 880 107.5 L 380 107.5 L 380 129.63" fill="none" stroke="#000000" stroke-miterlimit="10" pointer-events="stroke" style="stroke: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));"/><path d="M 380 134.88 L 376.5 127.88 L 380 129.63 L 383.5 127.88 Z" fill="#000000" stroke="#000000" stroke-miterlimit="10" pointer-events="all" style="fill: light-dark(rgb(0, 0, 0), rgb(255, 255, 255)); stroke: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));"/></g></g><g data-cell-id="15"><g><path d="M 880 79 L 880 129.63" fill="none" stroke="#000000" stroke-miterlimit="10" pointer-events="stroke" style="stroke: light-dark(rgb(0, 0, 0), rgb(255, 255, 255));"/><path d="M 880 134.88 L 876.5 127.88 L 880 129.63 L 883.5 127.88 Z" fill="#000000" stroke="#000000" stroke-miterlimit="10" pointer-events="all" style="fill: light-dark(rgb(0, 0, 0), rgb(255, 255, 255)); stroke: light-dark(rgb(0, 0, 0), 